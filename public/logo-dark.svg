<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56" width="260" height="56" role="img" aria-label="법무법인 이준 강북 분사무소">
  <defs>
    <style>
      .white { fill: #ffffff; }
      .gold { fill: #B89461; }
      .wordmark { font-family: 'Noto Sans KR', 'Pretendard', system-ui, sans-serif; font-weight: 800; }
      .sub { font-family: 'Noto Sans KR', 'Pretendard', system-ui, sans-serif; font-weight: 500; letter-spacing: 0.18em; }
    </style>
  </defs>
  <g transform="translate(8 8)">
    <rect x="0" y="0" width="40" height="40" rx="4" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.25"/>
    <text class="wordmark white" x="20" y="27" text-anchor="middle" font-size="18">이</text>
    <rect class="gold" x="0" y="35" width="40" height="5"/>
  </g>
  <g transform="translate(60 0)">
    <text class="wordmark white" x="0" y="28" font-size="20">법무법인 이준</text>
    <text class="sub white" x="0" y="46" font-size="9" opacity="0.7">LAW FIRM YIJUN · 강북 분사무소</text>
